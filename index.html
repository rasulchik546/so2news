<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Hub</title>
  <style>
    :root {
      --bg: #050507;
      --bg2: #0a0a0d;
      --panel: rgba(13, 13, 17, 0.95);
      --line: rgba(255, 255, 255, 0.10);
      --text: #f5f7fb;
      --muted: #a4aab8;
      --red: #ff2d2d;
      --red2: #ff6a3d;
      --white: #ffffff;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.55);
      --radius: 22px;
      --radius-lg: 28px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 45, 45, 0.15), transparent 24%),
        radial-gradient(circle at 100% 10%, rgba(255, 106, 61, 0.09), transparent 22%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }

    .app {
      width: min(1200px, calc(100% - 20px));
      margin: 0 auto;
      padding: 16px 0 20px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .brand h1 span {
      background: linear-gradient(90deg, #fff, #ff6767, #ff2d2d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand small {
      display: block;
      margin-top: 8px;
      color: #d8dde7;
      letter-spacing: 0.26em;
      font-size: 11px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      align-items: center;
    }

    .search, .select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
      transition: box-shadow .15s ease, border-color .15s ease;
    }

    .search::placeholder { color: #9299a8; }
    .search:focus, .select:focus {
      border-color: rgba(255,45,45,0.8);
      box-shadow: 0 0 0 3px rgba(255,45,45,0.16);
    }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #eef1f7;
      border-radius: 999px;
      padding: 10px 15px;
      cursor: pointer;
      transition: .15s ease;
      font-size: 13px;
      white-space: nowrap;
    }

    .tab:hover { transform: translateY(-1px); }
    .tab.active {
      background: linear-gradient(135deg, rgba(255,45,45,0.22), rgba(255,255,255,0.04));
      border-color: rgba(255,45,45,0.30);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 2px;
    }

    .section-head h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .section-head small { color: var(--muted); }

    .news-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .news-card {
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      cursor: pointer;
    }

    .news-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,45,45,0.36);
      background: rgba(255,255,255,0.05);
    }

    .news-card .img {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      object-fit: cover;
      background: #111;
    }

    .news-card .body {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .news-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      color: #eef1f6;
      font-size: 12px;
    }

    .news-card h4 {
      margin: 0;
      font-size: 18px;
      line-height: 1.22;
    }

    .news-card p {
      margin: 0;
      color: #ccd3df;
      line-height: 1.65;
      font-size: 14px;
    }

    .news-foot {
      color: var(--muted);
      font-size: 12px;
    }

    .compact .news-card {
      display: grid;
      grid-template-columns: 140px minmax(0, 1fr);
    }

    .compact .news-card .img {
      aspect-ratio: auto;
      height: 100%;
      min-height: 145px;
    }

    .empty {
      padding: 22px;
      border: 1px dashed rgba(255,255,255,0.16);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      text-align: center;
      line-height: 1.7;
    }

    .footer {
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.65;
      padding: 4px 0 8px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(10px);
      z-index: 100;
      padding: 16px;
    }
    .overlay.open { display: flex; }

    .modal {
      width: min(920px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #09090d;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }

    .modal-head h4 {
      margin: 0;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .close {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 14px;
      background: var(--white);
      color: #111;
      font-weight: 900;
      cursor: pointer;
    }

    .modal-body { padding: 18px; }
    .modal-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #111;
      margin-bottom: 16px;
    }
    .modal-title {
      margin: 0 0 10px;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.1;
    }
    .modal-text {
      margin: 0;
      color: #dbe0ea;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .controls { grid-template-columns: 1fr; }
      .news-grid { grid-template-columns: 1fr; }
      .compact .news-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel topbar">
      <div class="brand">
        <h1><span>NEWS</span> HUB</h1>
        <small>ARTICLES</small>
      </div>
      <div class="controls">
        <input class="search" id="searchInput" type="search" placeholder="Поиск по статьям..." />
        <select class="select" id="sortSelect">
          <option value="newest">Сначала новые</option>
          <option value="oldest">Сначала старые</option>
        </select>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="status" id="statusText">Чтение файла news.json из этой же папки...</div>
    </section>

    <section class="panel" style="padding: 18px; display: grid; gap: 14px;" id="articles">
      <div class="section-head">
        <div>
          <h3>Статьи и новости</h3>
          <small>Выбирай категорию, ищи по тексту и открывай полную статью</small>
        </div>
        <button class="tab" id="toggleLayoutBtn" type="button">Компактно</button>
      </div>

      <div class="news-grid" id="newsGrid"></div>
      <div class="footer" id="about">Если `news.json` лежит рядом с этим файлом и сайт открыт через сервер или GitHub Pages, статьи загрузятся автоматически.</div>
    </section>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h4 id="modalKicker">Статья</h4>
        </div>
        <button class="close" id="closeModal" type="button">×</button>
      </div>
      <div class="modal-body">
        <img class="modal-img" id="modalImg" alt="Статья" />
        <h3 class="modal-title" id="modalTitle">Заголовок</h3>
        <p class="modal-text" id="modalText">Текст статьи.</p>
      </div>
    </div>
  </div>

  <script>
    const categories = [
      { id: 'all', label: 'Все' },
      { id: 'news', label: 'Новости' },
      { id: 'updates', label: 'Обновления' },
      { id: 'tournaments', label: 'Турниры' },
      { id: 'rumors', label: 'Слухи' },
      { id: 'guides', label: 'Гайды' },
    ];

    const state = {
      posts: [],
      visible: [],
      currentFilter: 'all',
      compact: false,
    };

    const els = {
      tabs: document.getElementById('tabs'),
      searchInput: document.getElementById('searchInput'),
      sortSelect: document.getElementById('sortSelect'),
      toggleLayoutBtn: document.getElementById('toggleLayoutBtn'),
      statusText: document.getElementById('statusText'),
      newsGrid: document.getElementById('newsGrid'),
      overlay: document.getElementById('overlay'),
      closeModal: document.getElementById('closeModal'),
      modalKicker: document.getElementById('modalKicker'),
      modalTitle: document.getElementById('modalTitle'),
      modalText: document.getElementById('modalText'),
      modalImg: document.getElementById('modalImg'),
    };

    function esc(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function imgFallback(label = 'News') {
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
          <defs>
            <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#121217" />
              <stop offset="100%" stop-color="#2b0a0a" />
            </linearGradient>
          </defs>
          <rect width="1200" height="675" fill="url(#g)" />
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#fff" font-size="46" font-family="Arial" font-weight="700">${esc(label)}</text>
        </svg>
      `);
    }

    function normalizeCategory(cat) {
      const c = String(cat || '').toLowerCase().trim();
      const map = {
        'новости': 'news',
        'news': 'news',
        'обновления': 'updates',
        'updates': 'updates',
        'турниры': 'tournaments',
        'tournaments': 'tournaments',
        'слухи': 'rumors',
        'rumors': 'rumors',
        'гайды': 'guides',
        'guides': 'guides'
      };
      return map[c] || 'news';
    }

    function categoryLabel(cat) {
      const found = categories.find(c => c.id === cat);
      return found ? found.label : 'Новости';
    }

    function toArray(data) {
      if (Array.isArray(data)) return data;
      if (data && typeof data === 'object') return [data];
      return [];
    }

    function setPosts(data) {
      state.posts = toArray(data).map((item, i) => ({
        id: String(item.id || `post-${i + 1}`),
        title: String(item.title || '').trim(),
        category: normalizeCategory(item.category),
        date: String(item.date || '').trim(),
        excerpt: String(item.excerpt || item.short || '').trim(),
        content: String(item.content || item.text || '').trim(),
        image: String(item.image || '').trim(),
      })).filter(p => p.title || p.excerpt || p.content);

      els.statusText.textContent = state.posts.length
        ? `news.json загружен: ${state.posts.length} статей`
        : 'news.json пустой или не содержит статей';

      renderTabs();
      renderPosts();
    }

    function renderTabs() {
      els.tabs.innerHTML = categories.map(c => `
        <button class="tab ${c.id === state.currentFilter ? 'active' : ''}" type="button" data-filter="${c.id}">${esc(c.label)}</button>
      `).join('');
    }

    function filteredPosts() {
      const q = els.searchInput.value.trim().toLowerCase();
      return state.posts.filter(p => {
        const catOk = state.currentFilter === 'all' || p.category === state.currentFilter;
        const text = [p.title, p.excerpt, p.content, p.date, categoryLabel(p.category)].join(' ').toLowerCase();
        const searchOk = !q || text.includes(q);
        return catOk && searchOk;
      }).sort((a, b) => {
        const da = new Date(a.date).getTime() || 0;
        const db = new Date(b.date).getTime() || 0;
        return els.sortSelect.value === 'oldest' ? da - db : db - da;
      });
    }

    function renderPosts() {
      const list = filteredPosts();
      state.visible = list;
      syncTabs();

      if (!list.length) {
        els.newsGrid.innerHTML = '<div class="empty" style="grid-column:1/-1;">Статей пока нет или они не подходят под фильтр.</div>';
        return;
      }

      els.newsGrid.className = state.compact ? 'news-grid compact' : 'news-grid';
      els.newsGrid.innerHTML = list.map((p, index) => `
        <article class="news-card" data-index="${index}">
          <img class="img" src="${esc(p.image || imgFallback(p.title || 'News'))}" alt="${esc(p.title)}" onerror="this.src='${imgFallback(p.title || 'News')}'" />
          <div class="body">
            <div class="meta">
              <span class="pill">${esc(categoryLabel(p.category))}</span>
              ${p.date ? `<span class="pill">${esc(p.date)}</span>` : ''}
            </div>
            <h4>${esc(p.title)}</h4>
            <p>${esc(p.excerpt || p.content || '')}</p>
            <div class="news-foot">Нажми, чтобы открыть статью</div>
          </div>
        </article>
      `).join('');
    }

    function syncTabs() {
      document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === state.currentFilter);
      });
    }

    function openModal(post) {
      if (!post) return;
      els.modalKicker.textContent = categoryLabel(post.category);
      els.modalTitle.textContent = post.title;
      els.modalText.textContent = post.content || post.excerpt || '';
      els.modalImg.src = post.image || imgFallback(post.title || 'News');
      els.modalImg.alt = post.title;
      els.overlay.classList.add('open');
    }

    function closeModal() {
      els.overlay.classList.remove('open');
    }

    function loadFromJsonUrl() {
      fetch('./news.json', { cache: 'no-store' })
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(setPosts)
        .catch(() => {
          state.posts = [];
          els.statusText.textContent = 'Не удалось прочитать news.json из папки рядом с сайтом';
          renderTabs();
          renderPosts();
        });
    }

    els.tabs.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;
      state.currentFilter = btn.dataset.filter;
      renderTabs();
      renderPosts();
    });

    els.searchInput.addEventListener('input', renderPosts);
    els.sortSelect.addEventListener('change', renderPosts);
    els.toggleLayoutBtn.addEventListener('click', () => {
      state.compact = !state.compact;
      els.toggleLayoutBtn.textContent = state.compact ? 'Карточки' : 'Компактно';
      renderPosts();
    });

    els.newsGrid.addEventListener('click', (e) => {
      const card = e.target.closest('[data-index]');
      if (!card) return;
      const post = state.visible[Number(card.dataset.index)];
      if (post) openModal(post);
    });

    els.overlay.addEventListener('click', (e) => {
      if (e.target === els.overlay) closeModal();
    });
    els.closeModal.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    renderTabs();
    loadFromJsonUrl();
  </script>
</
